name: 360V6-Special-Build
permissions: write-all

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/coolbele/sdf8057-ipq6000
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ./config/yu.config
  DIY_P1_SH: ./scripts/360V6/diy2.sh
  DIY_P2_SH: ./scripts/360V6/360V6-cs.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1. 检查项目
      uses: actions/checkout@main

    - name: 2. 初始化环境与深度清理
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 深度清理磁盘空间
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
        sudo docker image prune -a -f
        
        # 【核心修正】彻底移除宿主机的 SELinux 干扰
        sudo apt-get remove -y libselinux1-dev
        sudo find /usr -name "selinux.h" -delete || true
        
        # 执行原有的环境初始化
        sudo bash -c 'bash <(curl -s https://raw.githubusercontent.com/coolbele/Actions-360v6/refs/heads/main/patches/init_build_environment.sh)'
        sudo timedatectl set-timezone $TZ
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
    - name: 3. 安装 Go 1.24.7
      run: |
        curl -L https://go.dev/dl/go1.24.7.linux-amd64.tar.gz -o go.tar.gz
        sudo rm -rf /usr/local/go
        sudo tar -C /usr/local -xzf go.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH
    - name: 4. 克隆源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV
    - name: 5. 更新 Feeds 并修复 Sing-box
      run: |
        cd ${{ env.OPENWRT_PATH }}
        [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH
        ./scripts/feeds update -a
        
        # 针对 Passwall 里的 Sing-box 进行版本锁定
        SB_MAKEFILE=$(find feeds/passwall_packages/sing-box -name Makefile 2>/dev/null | head -n 1)
        if [ -f "$SB_MAKEFILE" ]; then
          sed -i 's/PKG_VERSION:=.*/PKG_VERSION:=1.11.3/g' "$SB_MAKEFILE"
          sed -i 's/PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=v1.11.3/g' "$SB_MAKEFILE"
          sed -i '/PKG_HASH:=/d' "$SB_MAKEFILE"
        fi
        ./scripts/feeds install -a
    - name: 6. 劫持 Go 编译路径
      run: |
        mkdir -p $HOME/.local/bin
        ln -sf /usr/local/go/bin/go $HOME/.local/bin/go
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "GOTOOLCHAIN=local" >> $GITHUB_ENV
        echo "GOROOT=/usr/local/go" >> $GITHUB_ENV
        
    - name: 7. 环境硬修复 (路径封锁版)
      run: |
        cd ${{ env.OPENWRT_PATH }}
        
        # [逻辑点 1] 强行修改 iproute2 的探测脚本，使其直接忽略 SELinux
        # 针对 ipq60xx 5.0.0 版本，直接修改其内置 configure
        find package/network/utils/iproute2 -name "configure" | while read -r config_file; do
          sed -i 's/check_selinux//g' "$config_file"
        done

        # [逻辑点 2] 在 Makefile 层面注入强制关闭参数
        find package/network/utils/iproute2 -name Makefile -exec sed -i 's/HAVE_SELINUX:=y/HAVE_SELINUX:=n/g' {} +
        find package/network/utils/iproute2 -name Makefile -exec sed -i 's/HAVE_SELINUX=y/HAVE_SELINUX=n/g' {} +

        # [逻辑点 3] 劫持编译环境变量，禁止链接器访问宿主机 selinux 路径
        echo "EXTRA_CFLAGS += -DNO_SELINUX" >> .config
        echo "EXTRA_LDFLAGS += -L/usr/lib/x86_64-linux-gnu -l:libselinux.so.1 -n" >> .config # 这是一个占位技巧
        
    - name: 8. 导入配置与最终依赖修正
      run: |
        cd ${{ env.OPENWRT_PATH }}
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 强制在 config 中显式关闭 libselinux (让打包脚本不检查它)
        sed -i '/CONFIG_PACKAGE_libselinux/d' .config
        echo "CONFIG_PACKAGE_libselinux=n" >> .config
        
        # 修正 wpad 冲突
        sed -i 's/CONFIG_PACKAGE_wpad-openssl=y/CONFIG_PACKAGE_wpad-openssl=n/g' .config
        
        ./scripts/feeds install -a
        make defconfig
        
    - name: 9. 下载软件包
      run: |
        cd ${{ env.OPENWRT_PATH }}
        make download -j8
        find dl -size -1024c -exec rm -f {} \;
        
    - name: 10. 执行编译
      id: compile
      run: |
        cd ${{ env.OPENWRT_PATH }}
        # 重点：在编译命令前加入 LD_LIBRARY_PATH 保护，确保使用交叉编译链而非宿主机
        make package/network/utils/iproute2/clean
        make package/network/utils/iproute2/compile V=s
        
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: 11. 整理并上传
      if: steps.compile.outputs.status == 'success'
      run: |
        cd ${{ env.OPENWRT_PATH }}/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
    - name: 12. 上传至 Artifacts
      uses: actions/upload-artifact@main
      if: env.FIRMWARE != ''
      with:
        name: OpenWrt_360V6_Fixed
        path: ${{ env.FIRMWARE }}
